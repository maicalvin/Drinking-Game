<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Higher or Lower - Party Pour</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>
    <div id="screen-flash" aria-hidden="true"></div>

    <header class="hero">
      <p class="eyebrow">Party Pour</p>
      <h1>Higher or Lower</h1>
      <p class="hero-copy">Build your streak and test your luck.</p>
      <div class="hero-controls">
        <a class="ghost" href="index.html">Back Home</a>
        <button id="fx-toggle" class="ghost" type="button">Party Sound: On</button>
        <p id="fx-status">Hype mode active</p>
      </div>
    </header>

    <main class="layout">
      <section class="panel active" id="higher-lower" aria-labelledby="higher-lower-heading">
        <div class="panel-header">
          <h3 id="higher-lower-heading">Higher or Lower</h3>
          <p>Guess whether the next card is higher or lower than the current card.</p>
        </div>

        <div class="status-tile">
          <p class="tile-label">Current Card</p>
          <div class="poker-card is-back" id="hl-poker-card" aria-hidden="true">
            <div class="poker-card-face poker-card-back">
              <p>HIGH/LOW</p>
            </div>
          </div>
          <p class="tile-value" id="hl-current">Draw to begin</p>
        </div>

        <div class="status-row">
          <button id="hl-higher" class="draw">Higher</button>
          <button id="hl-lower" class="draw">Lower</button>
          <button id="hl-reset" class="ghost">Reset Deck</button>
        </div>
        <p id="hl-streak" class="helper-text">Streak: 0</p>
        <p id="hl-status" class="helper-text">Make a guess to reveal the next card.</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
