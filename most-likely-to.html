<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Most Likely To - Party Pour</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>
    <div id="screen-flash" aria-hidden="true"></div>

    <header class="hero">
      <p class="eyebrow">Party Pour</p>
      <h1>Most Likely To</h1>
      <p class="hero-copy">Point, vote, and settle who fits the scenario.</p>
      <div class="hero-controls">
        <a class="ghost" href="index.html">Back Home</a>
        <button id="fx-toggle" class="ghost" type="button">Party Sound: On</button>
        <p id="fx-status">Hype mode active</p>
      </div>
    </header>

    <main class="layout">
      <section class="panel active" id="most-likely-to" aria-labelledby="mlt-heading">
        <div class="panel-header">
          <h3 id="mlt-heading">Most Likely To</h3>
          <p>Read the scenario, vote quickly, and losing vote drinks.</p>
        </div>

        <div class="deck-area">
          <button id="draw-mlt" class="draw">New Scenario</button>
          <div class="card-output" id="mlt-output" aria-live="polite">
            <p class="card-rank">Most likely to...</p>
            <p class="card-rule">Tap new scenario to start.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
